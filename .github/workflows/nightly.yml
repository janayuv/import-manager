name: Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  nightly-tests:
    name: Nightly full suite
    runs-on: windows-latest
    env:
      HUSKY: '0'
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite
        run: npm run test:ci
