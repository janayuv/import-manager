name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      HUSKY: '0'
      CI: true
      # Match CI build job so Tauri + SQLCipher link on Windows runners
      SQLCIPHER_LIB_DIR: C:\vcpkg\installed\x64-windows\lib
      SQLCIPHER_INCLUDE_DIR: C:\vcpkg\installed\x64-windows\include
      LIBSQLITE3_SYS_BUNDLED: '1'
      SIGNING_CERTIFICATE: ${{ secrets.SIGNING_CERTIFICATE }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate version tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          echo "Validating tag format..."
          if [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "Invalid tag format"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Record release start time
        id: record_release_start
        shell: bash
        run: echo "RELEASE_START=$(date +%s)" >> $GITHUB_ENV

      - name: Build Tauri application
        run: npm run tauri build

      - name: Upload release build logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-build-logs
          path: |
            src-tauri/target/debug/build/
            src-tauri/target/release/build/
            src-tauri/target/release/*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Sign binaries (optional)
        if: env.SIGNING_CERTIFICATE != ''
        run: |
          echo "Signing binaries..."

          # Placeholder for signing command

      - name: Verify installer files exist
        shell: bash
        run: |
          echo "Checking installer files..."

          dump_bundle() {
            echo "Bundle contents:"
            ls -R src-tauri/target/release/bundle/ || true
          }

          shopt -s globstar

          # MSI installer (**/*.msi)

          if ! compgen -G "src-tauri/target/release/bundle/**/*.msi" > /dev/null; then
            dump_bundle
            echo "MSI installer missing"
            exit 1
          fi

          # NSIS installer (**/nsis/**/*.exe)

          if ! compgen -G "src-tauri/target/release/bundle/**/nsis/**/*.exe" > /dev/null; then
            dump_bundle
            echo "NSIS installer missing"
            exit 1
          fi

          # Optional standalone EXE (**/exe/**/*.exe) — only when an exe/ bundle dir exists

          if find src-tauri/target/release/bundle -type d -name exe 2>/dev/null | head -n1 | grep -q .; then
            if ! compgen -G "src-tauri/target/release/bundle/**/exe/**/*.exe" > /dev/null; then
              dump_bundle
              echo "Standalone EXE installer missing"
              exit 1
            fi
          fi

      - name: Generate build metadata
        shell: bash
        run: |
          META_DATE=$(date -u)
          echo "Build metadata:"
          echo "Tag: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"
          echo "Date: ${META_DATE}"

          echo "RELEASE_METADATA_DATE=${META_DATE}" >> "$GITHUB_ENV"

          echo "## Build Metadata" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo "Date: ${META_DATE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ### Build Metadata
            Tag: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Date: ${{ env.RELEASE_METADATA_DATE }}
          files: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/nsis/**/*.exe
            src-tauri/target/release/bundle/**/exe/**/*.exe

      - name: Show release duration
        if: always() && steps.record_release_start.outcome == 'success'
        shell: bash
        run: |
          END=$(date +%s)
          DURATION=$((END - RELEASE_START))
          echo "Release duration: ${DURATION}s"

          echo "## Release Duration" >> "$GITHUB_STEP_SUMMARY"
          echo "Total release time: ${DURATION} seconds" >> "$GITHUB_STEP_SUMMARY"
